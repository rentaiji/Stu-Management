<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生综合服务与教学协同平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            width: 100%; max-width: 420px; padding: 40px;
            background: #fff; border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        .login-header p { color: #999; font-size: 14px; }
        .login-form .el-form-item { margin-bottom: 24px; }
        .login-form .el-input__inner { height: 45px; border-radius: 5px; }
        .login-btn {
            width: 100%; height: 45px; border-radius: 5px;
            font-size: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .register-link { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
        .register-link a { color: #667eea; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-header">
                <h1>学生综合服务与教学协同平台</h1>
                <p>欢迎登录</p>
            </div>
            <el-form :model="loginForm" :rules="loginRules" ref="loginForm" class="login-form">
                <el-form-item prop="username">
                    <el-input v-model="loginForm.username" placeholder="请输入用户名" prefix-icon="el-icon-user"></el-input>
                </el-form-item>
                <el-form-item prop="password">
                    <el-input type="password" v-model="loginForm.password" placeholder="请输入密码" prefix-icon="el-icon-lock" @keyup.enter.native="handleLogin"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" class="login-btn" @click="handleLogin" :loading="loading">
                        {{ loading ? '登录中...' : '登录' }}
                    </el-button>
                </el-form-item>
                <div class="register-link">
                    <span>还没有账号？</span>
                    <a @click="showRegisterDialog">立即注册</a>
                </div>
            </el-form>
        </div>

        <el-dialog title="用户注册" :visible.sync="registerDialogVisible" width="400px">
            <el-form :model="registerForm" :rules="registerRules" ref="registerForm" label-width="80px">
                <el-form-item label="用户名" prop="userName">
                    <el-input v-model="registerForm.userName"></el-input>
                </el-form-item>
                <el-form-item label="真实姓名" prop="realName">
                    <el-input v-model="registerForm.realName"></el-input>
                </el-form-item>
                <el-form-item label="密码" prop="password">
                    <el-input type="password" v-model="registerForm.password"></el-input>
                </el-form-item>
                <el-form-item label="确认密码" prop="confirmPassword">
                    <el-input type="password" v-model="registerForm.confirmPassword"></el-input>
                </el-form-item>
                <el-form-item label="邮箱" prop="email">
                    <el-input v-model="registerForm.email"></el-input>
                </el-form-item>
                <el-form-item label="手机号" prop="phone">
                    <el-input v-model="registerForm.phone"></el-input>
                </el-form-item>
            </el-form>
            <span slot="footer">
                <el-button @click="registerDialogVisible = false">取消</el-button>
                <el-button type="primary" @click="handleRegister">注册</el-button>
            </span>
        </el-dialog>
    </div>

    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                loading: false,
                loginForm: { username: '', password: '' },
                loginRules: {
                    username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                    password: [{ required: true, message: '请输入密码', trigger: 'blur' }]
                },
                registerDialogVisible: false,
                registerForm: { userName: '', realName: '', password: '', confirmPassword: '', email: '', phone: '' },
                registerRules: {
                    userName: [
                        { required: true, message: '请输入用户名', trigger: 'blur' },
                        { min: 3, max: 20, message: '长度在 3 到 20 个字符', trigger: 'blur' }
                    ],
                    realName: [{ required: true, message: '请输入真实姓名', trigger: 'blur' }],
                    password: [
                        { required: true, message: '请输入密码', trigger: 'blur' },
                        { min: 6, message: '密码长度不能少于 6 位', trigger: 'blur' }
                    ],
                    confirmPassword: [
                        { required: true, message: '请再次输入密码', trigger: 'blur' },
                        { validator: (rule, value, callback) => {
                            if (value !== this.registerForm.password) {
                                callback(new Error('两次输入的密码不一致'));
                            } else { callback(); }
                        }, trigger: 'blur' }
                    ],
                    email: [{ type: 'email', message: '请输入正确的邮箱格式', trigger: 'blur' }],
                    phone: [{ pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号', trigger: 'blur' }]
                }
            },
            methods: {
                async handleLogin() {
                    try {
                        await this.$refs.loginForm.validate();
                        this.loading = true;
                        const response = await axios.post('/api/sys/user/login', {
                            username: this.loginForm.username,
                            password: this.loginForm.password
                        });
                        if (response.data.code === 200) {
                            localStorage.setItem('token', response.data.data.token);
                            localStorage.setItem('user', JSON.stringify(response.data.data.user));
                            this.$message.success('登录成功');
                            setTimeout(() => location.reload(), 1000);
                        } else {
                            this.$message.error(response.data.message || '登录失败');
                        }
                    } catch (error) {
                        this.$message.error(error.response?.data?.message || '登录失败');
                    } finally {
                        this.loading = false;
                    }
                },
                showRegisterDialog() {
                    this.registerDialogVisible = true;
                    this.registerForm = { userName: '', realName: '', password: '', confirmPassword: '', email: '', phone: '' };
                },
                async handleRegister() {
                    try {
                        await this.$refs.registerForm.validate();
                        const response = await axios.post('/api/sys/user/register', this.registerForm);
                        if (response.data.code === 200) {
                            this.$message.success('注册成功，请登录');
                            this.registerDialogVisible = false;
                        } else {
                            this.$message.error(response.data.message || '注册失败');
                        }
                    } catch (error) {
                        this.$message.error(error.response?.data?.message || '注册失败');
                    }
                }
            }
        });
    </script>
</body>
</html>
