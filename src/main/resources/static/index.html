
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生综合服务与教学协同平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            width: 100%; max-width: 420px; padding: 40px;
            background: #fff; border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        .login-header p { color: #999; font-size: 14px; }
        .login-form .el-form-item { margin-bottom: 24px; }
        .login-form .el-input__inner { height: 45px; border-radius: 5px; }
        .login-btn {
            width: 100%; height: 45px; border-radius: 5px;
            font-size: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .register-link { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
        .register-link a { color: #667eea; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-header">
                <h1>学生综合服务与教学协同平台</h1>
                <p>欢迎登录</p>
            </div>
            <el-form :model="loginForm" :rules="loginRules" ref="loginForm" class="login-form">
                <el-form-item prop="username">
                    <el-input v-model="loginForm.username" placeholder="请输入学号/工号" prefix-icon="el-icon-user"></el-input>
                </el-form-item>
                <el-form-item prop="password">
                    <el-input type="password" v-model="loginForm.password" placeholder="请输入密码" prefix-icon="el-icon-lock" @keyup.enter.native="handleLogin"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" class="login-btn" @click="handleLogin" :loading="loading">
                        {{ loading ? '登录中...' : '登录' }}
                    </el-button>
                </el-form-item>
                <div class="register-link">
                    <span>如有问题，请联系管理员</span>
                </div>
            </el-form>
        </div>


    </div>

    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                loading: false,
                loginForm: { username: '', password: '' },
                loginRules: {
                    username: [{ required: true, message: '请输入学号/工号', trigger: 'blur' }],
                    password: [{ required: true, message: '请输入密码', trigger: 'blur' }]
                },
            },
            methods: {
                async handleLogin() {
                    try {
                        await this.$refs.loginForm.validate();
                        this.loading = true;
                        const response = await axios.post('/sys/user/login', {
                            account: this.loginForm.username,
                            password: this.loginForm.password
                        });
                        if (response.data.code === 200) {
                            const user = response.data.data.user;
                            localStorage.setItem('token', response.data.data.token);
                            localStorage.setItem('user', JSON.stringify(user));
                            this.$message.success('登录成功');
                            // 根据用户类型跳转到不同页面
                            if (user.userType === '2') {
                                window.location.href = '/main.html'; // 管理员
                            } else if (user.userType === '1') {
                                window.location.href = '/teacher.html'; // 教师
                            } else {
                                window.location.href = '/student.html'; // 学生
                            }
                        } else {
                            this.$message.error(response.data.message || '登录失败');
                        }
                    } catch (error) {
                        this.$message.error(error.response?.data?.message || '登录失败');
                    } finally {
                        this.loading = false;
                    }
                },
            }
        });
    </script>
</body>
</html>
