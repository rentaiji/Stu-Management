<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - 学生综合服务与教学协同平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .logout-btn { cursor: pointer; }
        .container { display: flex; height: calc(100vh - 80px); }
        .sidebar { width: 200px; background: white; box-shadow: 2px 0 8px rgba(0,0,0,0.1); }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>学生综合服务与教学协同平台</h1>
            <div class="user-info">
                <span>欢迎，{{ currentUser.realName || currentUser.userName }}</span>
                <el-button type="text" class="logout-btn" @click="handleLogout">退出登录</el-button>
            </div>
        </div>
        <div class="container">
            <div class="sidebar">
                <el-menu :default-active="activeMenu" @select="navigateTo" background-color="#fff" text-color="#333" active-text-color="#667eea">
                    <el-menu-item index="dashboard">
                        <i class="el-icon-s-home"></i>
                        <span>首页</span>
                    </el-menu-item>
                    <el-menu-item index="student">
                        <i class="el-icon-user"></i>
                        <span>学生管理</span>
                    </el-menu-item>
                    <el-menu-item index="course">
                        <i class="el-icon-reading"></i>
                        <span>课程管理</span>
                    </el-menu-item>
                    <el-menu-item index="score">
                        <i class="el-icon-edit"></i>
                        <span>成绩管理</span>
                    </el-menu-item>
                    <el-menu-item index="class">
                        <i class="el-icon-s-cooperation"></i>
                        <span>班级管理</span>
                    </el-menu-item>
                    <el-menu-item index="select">
                        <i class="el-icon-circle-check"></i>
                        <span>选课管理</span>
                    </el-menu-item>
                </el-menu>
            </div>
            <div class="main-content">
                <!-- 首页 -->
                <div v-if="currentPage === 'dashboard'" class="card">
                    <h2>欢迎使用系统</h2>
                    <p>请选择左侧菜单进行操作</p>
                </div>
                
                <!-- 学生管理 -->
                <div v-if="currentPage === 'student'" class="card">
                    <h2>学生管理</h2>
                    <div style="margin-bottom: 10px;">
                        <el-input 
                            v-model="searchKeyword" 
                            placeholder="请输入学号或姓名查询" 
                            style="width: 300px; margin-right: 10px;"
                            clearable
                            @keyup.enter.native="loadStudents">
                        </el-input>
                        <el-button type="primary" @click="loadStudents">查询</el-button>
                        <el-button @click="resetSearch">重置</el-button>
                        <el-button type="primary" @click="showStudentDialog()" style="float: right;">新增学生</el-button>
                    </div>
                    <el-table :data="students" style="width: 100%; margin-top: 10px;">
                        <el-table-column prop="userName" label="学号"></el-table-column>
                        <el-table-column prop="realName" label="姓名"></el-table-column>
                        <el-table-column prop="phone" label="手机号"></el-table-column>
                        <el-table-column prop="email" label="邮箱"></el-table-column>
                        <el-table-column prop="userType" label="类型">
                            <template slot-scope="scope">
                                <span v-if="scope.row.userType === '0'">学生</span>
                                <span v-else-if="scope.row.userType === '1'">教师</span>
                                <span v-else>管理员</span>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" width="200">
                            <template slot-scope="scope">
                                <el-button size="mini" @click="editStudent(scope.row)">编辑</el-button>
                                <el-button size="mini" type="danger" @click="deleteUser(scope.row.userId)">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    
                    <el-dialog title="学生信息" :visible.sync="studentDialogVisible">
                        <el-form :model="studentForm" label-width="100px">
                            <el-form-item label="学号" required>
                                <el-input v-model="studentForm.userName" placeholder="请输入纯数字学号"></el-input>
                            </el-form-item>
                            <el-form-item label="姓名" required>
                                <el-input v-model="studentForm.realName"></el-input>
                            </el-form-item>
                            <el-form-item label="出生日期">
                                <el-date-picker v-model="studentForm.birthDate" type="date" placeholder="选择日期" style="width: 100%;"></el-date-picker>
                            </el-form-item>
                            <el-form-item label="出生地">
                                <el-input v-model="studentForm.birthPlace"></el-input>
                            </el-form-item>
                            <el-form-item label="手机号" required>
                                <el-input v-model="studentForm.phone"></el-input>
                            </el-form-item>
                            <el-form-item label="邮箱" required>
                                <el-input v-model="studentForm.email"></el-input>
                            </el-form-item>
                            <el-form-item label="身份证号">
                                <el-input v-model="studentForm.idCard"></el-input>
                            </el-form-item>
                            <el-form-item label="民族">
                                <el-select v-model="studentForm.nation" placeholder="请选择">
                                    <el-option label="汉" value="汉"></el-option>
                                    <el-option label="满" value="满"></el-option>
                                    <el-option label="回" value="回"></el-option>
                                    <el-option label="蒙古" value="蒙古"></el-option>
                                    <el-option label="藏" value="藏"></el-option>
                                    <el-option label="维吾尔" value="维吾尔"></el-option>
                                    <el-option label="其他" value="其他"></el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="政治面貌" required>
                                <el-select v-model="studentForm.politicalStatus" placeholder="请选择">
                                    <el-option label="群众" :value="0"></el-option>
                                    <el-option label="团员" :value="1"></el-option>
                                    <el-option label="党员" :value="2"></el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="密码" v-if="!studentForm.userId" required>
                                <el-input type="password" v-model="studentForm.password"></el-input>
                            </el-form-item>
                        </el-form>
                        <span slot="footer">
                            <el-button @click="studentDialogVisible = false">取消</el-button>
                            <el-button type="primary" @click="saveStudent">保存</el-button>
                        </span>
                    </el-dialog>
                </div>

                <!-- 课程管理 -->
                <div v-if="currentPage === 'course'" class="card">
                    <h2>课程管理</h2>
                    <el-button type="primary" @click="showCourseDialog()">新增课程</el-button>
                    <el-table :data="courses" style="width: 100%; margin-top: 10px;">
                        <el-table-column prop="courseCode" label="课程代码"></el-table-column>
                        <el-table-column prop="courseName" label="课程名称"></el-table-column>
                        <el-table-column prop="credits" label="学分"></el-table-column>
                        <el-table-column prop="hours" label="学时"></el-table-column>
                        <el-table-column prop="capacity" label="容量"></el-table-column>
                        <el-table-column label="操作" width="200">
                            <template slot-scope="scope">
                                <el-button size="mini" @click="editCourse(scope.row)">编辑</el-button>
                                <el-button size="mini" type="danger" @click="deleteCourse(scope.row.courseId)">删除</el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    
                    <el-dialog title="课程信息" :visible.sync="courseDialogVisible">
                        <el-form :model="courseForm" label-width="80px">
                            <el-form-item label="课程代码">
                                <el-input v-model="courseForm.courseCode"></el-input>
                            </el-form-item>
                            <el-form-item label="课程名称">
                                <el-input v-model="courseForm.courseName"></el-input>
                            </el-form-item>
                            <el-form-item label="学分">
                                <el-input-number v-model="courseForm.credits" :precision="1" :step="0.5"></el-input-number>
                            </el-form-item>
                            <el-form-item label="学时">
                                <el-input-number v-model="courseForm.hours"></el-input-number>
                            </el-form-item>
                            <el-form-item label="容量">
                                <el-input-number v-model="courseForm.capacity"></el-input-number>
                            </el-form-item>
                        </el-form>
                        <span slot="footer">
                            <el-button @click="courseDialogVisible = false">取消</el-button>
                            <el-button type="primary" @click="saveCourse">保存</el-button>
                        </span>
                    </el-dialog>
                </div>

                <!-- 成绩管理 -->
                <div v-if="currentPage === 'score'" class="card">
                    <h2>成绩管理</h2>
                    <p>暂无数据</p>
                </div>

                <!-- 班级管理 -->
                <div v-if="currentPage === 'class'" class="card">
                    <h2>班级管理</h2>
                    <p>暂无数据</p>
                </div>

                <!-- 选课管理 -->
                <div v-if="currentPage === 'select'" class="card">
                    <h2>选课管理</h2>
                    <p>暂无数据</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                currentPage: 'dashboard',
                activeMenu: 'dashboard',
                currentUser: {},
                students: [],
                courses: [],
                studentDialogVisible: false,
                courseDialogVisible: false,
                searchKeyword: '',
                studentForm: { 
                    userName: '', 
                    realName: '', 
                    phone: '', 
                    email: '', 
                    password: '',
                    birthDate: '',
                    birthPlace: '',
                    idCard: '',
                    nation: '汉',
                    politicalStatus: 0
                },
                courseForm: { courseCode: '', courseName: '', credits: 3, hours: 48, capacity: 100 }
            },
            created() {
                const user = localStorage.getItem('user');
                if (user) {
                    this.currentUser = JSON.parse(user);
                } else {
                    this.$message.error('未登录，请先登录');
                    window.location.href = '/index.html';
                }
            },
            methods: {
                navigateTo(page) {
                    this.currentPage = page;
                    this.activeMenu = page;
                    if (page === 'student') {
                        this.loadStudents();
                    } else if (page === 'course') {
                        this.loadCourses();
                    }
                },
                async loadStudents() {
                    try {
                        const params = { userType: '0' };
                        if (this.searchKeyword) {
                            params.keyword = this.searchKeyword;
                        }
                        const response = await axios.get('/sys/user/list', {
                            params: params,
                            headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                        });
                        if (response.data.code === 200) {
                            this.students = response.data.data || [];
                        }
                    } catch (error) {
                        console.error('加载学生列表失败', error);
                        this.$message.error('加载失败');
                    }
                },
                resetSearch() {
                    this.searchKeyword = '';
                    this.loadStudents();
                },
                async loadCourses() {
                    try {
                        const response = await axios.get('/edu/course/list', {
                            headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                        });
                        if (response.data.code === 200) {
                            this.courses = response.data.data || [];
                        }
                    } catch (error) {
                        console.error('加载课程列表失败', error);
                    }
                },
                showStudentDialog() {
                    console.log('showStudentDialog called');
                    console.log('studentForm before reset:', this.studentForm);
                    this.studentForm = { 
                        userName: '', 
                        realName: '', 
                        phone: '', 
                        email: '', 
                        password: '',
                        birthDate: '',
                        birthPlace: '',
                        idCard: '',
                        nation: '汉',
                        politicalStatus: 0
                    };
                    this.studentDialogVisible = true;
                    console.log('studentDialogVisible set to:', this.studentDialogVisible);
                },
                editStudent(row) {
                    this.studentForm = JSON.parse(JSON.stringify(row));
                    this.studentDialogVisible = true;
                },
                async saveStudent() {
                    // 必填项验证
                    if (!this.studentForm.userName) {
                        this.$message.error('请输入学号');
                        return;
                    }
                    if (!this.studentForm.realName) {
                        this.$message.error('请输入姓名');
                        return;
                    }
                    if (!this.studentForm.phone) {
                        this.$message.error('请输入手机号');
                        return;
                    }
                    if (!this.studentForm.email) {
                        this.$message.error('请输入邮箱');
                        return;
                    }
                    if (!this.studentForm.politicalStatus && this.studentForm.politicalStatus !== 0) {
                        this.$message.error('请选择政治面貌');
                        return;
                    }
                    if (!this.studentForm.userId && !this.studentForm.password) {
                        this.$message.error('请输入密码');
                        return;
                    }
                    try {
                        let response;
                        if (this.studentForm.userId) {
                            // 更新 - 使用 PUT
                            response = await axios.put('/sys/user', this.studentForm, {
                                headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                            });
                        } else {
                            // 新增 - 使用 POST
                            response = await axios.post('/sys/user', this.studentForm, {
                                headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                            });
                        }
                        if (response.data.code === 200) {
                            this.$message.success('保存成功');
                            this.studentDialogVisible = false;
                            this.loadStudents();
                        } else {
                            this.$message.error(response.data.message || '保存失败');
                        }
                    } catch (error) {
                        console.error('保存学生信息错误:', error);
                        this.$message.error(error.response?.data?.message || '保存失败');
                    }
                },
                deleteUser(userId) {
                    this.$confirm('确定要删除该用户吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(async () => {
                        try {
                            const response = await axios.delete(`/sys/user/${userId}`, {
                                headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                            });
                            if (response.data.code === 200) {
                                this.$message.success('删除成功');
                                this.loadStudents();
                            }
                        } catch (error) {
                            this.$message.error('删除失败');
                        }
                    }).catch(() => {});
                },
                showCourseDialog() {
                    this.courseForm = { courseCode: '', courseName: '', credits: 3, hours: 48, capacity: 100 };
                    this.courseDialogVisible = true;
                },
                editCourse(row) {
                    this.courseForm = JSON.parse(JSON.stringify(row));
                    this.courseDialogVisible = true;
                },
                async saveCourse() {
                    try {
                        let response;
                        if (this.courseForm.courseId) {
                            // 更新
                            response = await axios.put('/edu/course', this.courseForm, {
                                headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                            });
                        } else {
                            // 新增
                            response = await axios.post('/edu/course', this.courseForm, {
                                headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                            });
                        }
                        if (response.data.code === 200) {
                            this.$message.success('保存成功');
                            this.courseDialogVisible = false;
                            this.loadCourses();
                        }
                    } catch (error) {
                        this.$message.error('保存失败');
                    }
                },
                deleteCourse(courseId) {
                    this.$confirm('确定要删除该课程吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(async () => {
                        try {
                            const response = await axios.delete(`/edu/course/${courseId}`, {
                                headers: { Authorization: 'Bearer ' + localStorage.getItem('token') }
                            });
                            if (response.data.code === 200) {
                                this.$message.success('删除成功');
                                this.loadCourses();
                            }
                        } catch (error) {
                            this.$message.error('删除失败');
                        }
                    }).catch(() => {});
                },
                handleLogout() {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    this.$message.success('已退出登录');
                    window.location.href = '/index.html';
                }
            }
        });
    </script>
</body>
</html>
